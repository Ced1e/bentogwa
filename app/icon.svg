<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Slate Background with rounded corners -->
  <rect width="32" height="32" rx="8" fill="#0f172a" />
  
  <!-- Top Left: Solid White -->
  <rect x="7" y="7" width="8" height="8" rx="2" fill="#ffffff" />
  
  <!-- Top Right: White Outline -->
  <rect x="17" y="7" width="8" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.7" />
  
  <!-- Bottom Left: White Outline -->
  <rect x="7" y="17" width="8" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.7" />
  
  <!-- Bottom Right: Solid Indigo -->
  <rect x="17" y="17" width="8" height="8" rx="2" fill="#6366f1" />
</svg>
